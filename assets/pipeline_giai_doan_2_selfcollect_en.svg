<svg viewBox="0 0 760 910" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <title>Phase 2 — Self-Collected YouTube Pipeline to Run A and Run B1</title>
  <desc>yt-dlp downloads videos, transcribe with faster-whisper large-v3, sentence segmentation, noise reduction with Demucs, normalization, crosscheck 3 ASRs, LLM Gemini proofreads 2061 clips; training splits into two branches Run A (vinorm, full fine-tune) and Run B1 (vietnormalizer, freeze enc_p and dp); evaluate 4 models then deploy Run B1.</desc>
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="910" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="24" y="36" fill="#111827" font-size="18" font-weight="700">Phase 2 — Self-Collected YouTube → Run A &amp; Run B1</text>

  <g stroke="#6B7280" stroke-width="1.6" fill="none">
    <path d="M380,114 L380,142" marker-end="url(#ar2)"/>
    <path d="M380,196 L380,224" marker-end="url(#ar2)"/>
    <path d="M380,278 L380,306" marker-end="url(#ar2)"/>
    <path d="M380,360 L380,388" marker-end="url(#ar2)"/>
    <path d="M380,442 L380,470" marker-end="url(#ar2)"/>
    <path d="M380,524 L380,552" marker-end="url(#ar2)"/>
    <path d="M380,606 L380,634" marker-end="url(#ar2)"/>
    <path d="M380,694 L380,712 L215,712 L215,734" marker-end="url(#ar2)"/>
    <path d="M380,694 L380,712 L545,712 L545,734" marker-end="url(#ar2)"/>
    <path d="M215,798 L215,820 L380,820 L380,842" marker-end="url(#ar2)"/>
    <path d="M545,798 L545,820 L380,820"/>
  </g>

  <!-- n1 -->
  <rect x="230" y="58" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="82" fill="#111827" font-size="15" font-weight="600">1. Collection — yt-dlp</text>
  <text x="246" y="101" fill="#4B5563" font-size="12">6 videos (1 male voice) · WAV 48 kHz</text>
  <!-- n2 -->
  <rect x="230" y="142" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="166" fill="#111827" font-size="15" font-weight="600">2. Transcribe</text>
  <text x="246" y="185" fill="#4B5563" font-size="12">faster-whisper large-v3 (word timestamps)</text>
  <!-- n3 -->
  <rect x="230" y="224" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="248" fill="#111827" font-size="15" font-weight="600">3. Segmentation ~6s</text>
  <text x="246" y="267" fill="#4B5563" font-size="12">→ 2,368 clips</text>
  <!-- n4 -->
  <rect x="230" y="306" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="330" fill="#111827" font-size="15" font-weight="600">4. Denoising — Demucs</text>
  <text x="246" y="349" fill="#4B5563" font-size="12">htdemucs (vocal separation)</text>
  <!-- n5 -->
  <rect x="230" y="388" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="412" fill="#111827" font-size="15" font-weight="600">5. Normalization</text>
  <text x="246" y="431" fill="#4B5563" font-size="12">22.05 kHz · −23 LUFS · pad 0.2s → 2,367</text>
  <!-- n6 -->
  <rect x="230" y="470" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="494" fill="#111827" font-size="15" font-weight="600">6. Crosscheck 3 ASRs</text>
  <text x="246" y="513" fill="#4B5563" font-size="12">faster-whisper + Qwen3-ASR + Deepgram</text>
  <!-- n7 -->
  <rect x="230" y="552" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="576" fill="#111827" font-size="15" font-weight="600">7. LLM Gemini Proofreading</text>
  <text x="246" y="595" fill="#4B5563" font-size="12">2,061 clips · 4.22h (2023 Keep)</text>
  <!-- n8 -->
  <rect x="230" y="634" width="300" height="60" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="658" fill="#111827" font-size="15" font-weight="600">8. Training — General Config</text>
  <text x="246" y="677" fill="#4B5563" font-size="12">resume vais1000 · force-LR 1e-4 · keep 100% clips</text>

  <text x="120" y="728" fill="#6B7280" font-size="11.5" font-weight="700">BRANCH A</text>
  <text x="468" y="728" fill="#6B7280" font-size="11.5" font-weight="700">BRANCH B</text>
  <!-- Run A -->
  <rect x="60" y="734" width="310" height="64" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="76" y="759" fill="#111827" font-size="15" font-weight="600">Run A — Full Fine-Tune</text>
  <text x="76" y="778" fill="#4B5563" font-size="12">vinorm · train all parameters</text>
  <!-- Run B1 -->
  <rect x="390" y="734" width="310" height="64" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="406" y="759" fill="#111827" font-size="15" font-weight="600">Run B1 — Partial Freezing</text>
  <text x="406" y="778" fill="#4B5563" font-size="12">vietnormalizer · freeze enc_p + dp</text>
  <!-- result -->
  <rect x="230" y="842" width="300" height="58" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <text x="246" y="867" fill="#1D4ED8" font-size="15" font-weight="700">➤ 4-Model Eval → Deploy Run B1</text>
  <text x="246" y="886" fill="#4B5563" font-size="12">runB1_e4868 · WER 4.1% · NISQA 4.13</text>
</svg>
