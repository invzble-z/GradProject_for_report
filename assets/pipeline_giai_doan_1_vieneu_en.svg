<svg viewBox="0 0 720 800" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <title>Phase 1 — VieNeu Data Pipeline to Model 1</title>
  <desc>Select VieNeu, merge 3 speakers, normalize, PhoWhisper-large QC, filter Per-Speaker Hybrid 1500 clips, Piper preprocessing (1110 train clips, 390 validation clips), cross-gender VITS fine-tuning with LR approx 1.1e-4, producing Model 1 e5219.</desc>
  <defs>
    <marker id="ar1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="800" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="24" y="36" fill="#111827" font-size="18" font-weight="700">Phase 1 — Public Dataset VieNeu → Model 1</text>

  <g stroke="#6B7280" stroke-width="1.6" fill="none">
    <path d="M240,118 L240,152" marker-end="url(#ar1)"/>
    <path d="M240,208 L240,242" marker-end="url(#ar1)"/>
    <path d="M240,298 L240,332" marker-end="url(#ar1)"/>
    <path d="M240,388 L240,422" marker-end="url(#ar1)"/>
    <path d="M240,478 L240,512" marker-end="url(#ar1)"/>
    <path d="M240,568 L240,602" marker-end="url(#ar1)"/>
    <path d="M240,674 L240,704" marker-end="url(#ar1)"/>
    <path d="M390,540 L428,540" marker-end="url(#ar1)" stroke-dasharray="5 3"/>
  </g>

  <!-- n1 -->
  <rect x="90" y="62" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="86" fill="#111827" font-size="15" font-weight="600">1. Select Data Source</text>
  <text x="106" y="105" fill="#4B5563" font-size="12">VieNeu-TTS-140h — exclude FPT-FOSD</text>
  <!-- n2 -->
  <rect x="90" y="152" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="176" fill="#111827" font-size="15" font-weight="600">2. Merge 3 Male Speakers</text>
  <text x="106" y="195" fill="#4B5563" font-size="12">~1,999 clips · 3.65 hours</text>
  <!-- n3 -->
  <rect x="90" y="242" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="266" fill="#111827" font-size="15" font-weight="600">3. Audio Normalization</text>
  <text x="106" y="285" fill="#4B5563" font-size="12">22.05 kHz · −23 LUFS · silence trimming</text>
  <!-- n4 -->
  <rect x="90" y="332" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="356" fill="#111827" font-size="15" font-weight="600">4. Reverse Recognition QC</text>
  <text x="106" y="375" fill="#4B5563" font-size="12">PhoWhisper-large · WER/CER</text>
  <!-- n5 -->
  <rect x="90" y="422" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="446" fill="#111827" font-size="15" font-weight="600">5. Per-Speaker Hybrid Filtering</text>
  <text x="106" y="465" fill="#4B5563" font-size="12">1,500 clean clips · 2.5 hours</text>
  <!-- n6 -->
  <rect x="90" y="512" width="300" height="56" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="536" fill="#111827" font-size="15" font-weight="600">6. Piper Preprocessing — vinorm</text>
  <text x="106" y="555" fill="#4B5563" font-size="12">max-phoneme-ids 400 → 1,110 train clips</text>
  <!-- branch -->
  <rect x="428" y="512" width="272" height="56" rx="10" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="442" y="535" fill="#6B7280" font-size="11.5">390 long clips excluded →</text>
  <text x="442" y="552" fill="#6B7280" font-size="11.5">validation set (held-out, 4-model eval)</text>
  <!-- n7 -->
  <rect x="90" y="602" width="300" height="72" rx="10" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="106" y="626" fill="#111827" font-size="15" font-weight="600">7. Cross-Gender VITS Fine-Tuning</text>
  <text x="106" y="645" fill="#4B5563" font-size="12">base: vais1000-medium (female voice)</text>
  <text x="106" y="663" fill="#4B5563" font-size="12">LR ≈ 1.1e-4 (inherited from base checkpoint) · batch 16</text>
  <!-- result -->
  <rect x="90" y="704" width="300" height="58" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <text x="106" y="729" fill="#1D4ED8" font-size="15" font-weight="700">➤ Model 1 — checkpoint e5219</text>
  <text x="106" y="748" fill="#4B5563" font-size="12">male voice · ONNX FP32 ~63.5 MB</text>
</svg>
